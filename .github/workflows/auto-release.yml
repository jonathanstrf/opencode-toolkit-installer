name: Auto Release on master

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set TAG env from ref
        run: echo "TAG=${GITHUB_REF_NAME:-${GITHUB_REF#refs/tags/}}" >> $GITHUB_ENV

      - name: Run smoke test
        run: bash tests/smoke-test.sh

      - name: Create release package
        run: |
          mkdir -p release
          cd scripts
          zip -r ../release/opencode-toolkit-installer-${{ env.TAG }}.zip .
          cd ..
          sha256sum release/opencode-toolkit-installer-${{ env.TAG }}.zip > release/opencode-toolkit-installer-${{ env.TAG }}.zip.sha256

      - name: Create Release (softprops)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          files: |
            release/opencode-toolkit-installer-${{ env.TAG }}.zip
            release/opencode-toolkit-installer-${{ env.TAG }}.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

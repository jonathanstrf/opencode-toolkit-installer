name: Release

on:
  push:
    tags:
      - 'v*'

# Grant the workflow explicit permissions so it can create releases and upload assets.
# Some org or repo settings require explicit permission declarations.
permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run smoke test
        run: bash tests/smoke-test.sh
      - name: Create release package
        run: |
          cd scripts
          zip -r ../opencode-toolkit-installer-${{ github.ref_name }}.zip .
          cd ..
          sha256sum opencode-toolkit-installer-${{ github.ref_name }}.zip > opencode-toolkit-installer-${{ github.ref_name }}.zip.sha256
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            opencode-toolkit-installer-${{ github.ref_name }}.zip
            opencode-toolkit-installer-${{ github.ref_name }}.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # softprops/action-gh-release v1 requires a valid GITHUB_TOKEN with
        # write permissions to create releases. If you see 403 errors, verify
        # that the repository's Actions settings allow the workflow to create
        # and modify releases and that the token has not been restricted.
